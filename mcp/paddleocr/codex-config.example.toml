[mcp_servers.paddleocr]
type = "stdio"
command = "/absolute/path/to/paddleocr-mcp-venv/bin/python"
args = ["/absolute/path/to/paper2zh-chatgpt-web-skill/mcp/paddleocr/server.py"]

# Option A: pass the token directly through the MCP client environment.
# Prefer this for managed deployments where secrets are injected by the host.
# [mcp_servers.paddleocr.env]
# PADDLEOCR_ACCESS_TOKEN = "your-access-token-here"

# Option B: keep the token in a private .env file next to server.py.
# The server auto-loads mcp/paddleocr/.env when present.

